micronaut:
  application:
    name: config-service
  server:
    port: 8084
    context-path: /v1/config
  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true
        descriptions: true
    binders:
      jvm:
        enabled: true
      web:
        enabled: true
        server:
          percentiles: [0.5, 0.95, 0.99]
          histogram: true
      uptime:
        enabled: true
      jdbc:
        enabled: true
      processor:
        enabled: true

endpoints:
  health:
    enabled: true
    sensitive: false
  metrics:
    enabled: false
  prometheus:
    enabled: true
    sensitive: false

datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:config}
    username: ${DB_USER:config}
    password: ${DB_PASSWORD:config}
    driver-class-name: org.postgresql.Driver

flyway:
  datasources:
    default:
      enabled: true

config-service:
  internal-api-key: ${CONFIG_INTERNAL_API_KEY:dev-internal-key}
